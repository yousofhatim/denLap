<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نظام عيادات الأسنان - تسجيل الدخول</title>
    <link rel="stylesheet" href="logInStyle.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
            <button class="tab-btn" data-tab="signup">تسجيل عيادة جديدة</button>
        </div>
        
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور">
            <div id="loginError" class="error-msg" style="display: none;"></div>
            <button id="doLoginBtn" class="auth-btn">دخول إلى العيادة</button>
        </div>
        
        <div id="signupForm" class="auth-form hidden">
            <input type="text" id="clinicName" class="input-field" placeholder="اسم العيادة *">
            <input type="text" id="clinicNumber" class="input-field" placeholder="رقم العيادة *">
            <input type="text" id="doctorName" class="input-field" placeholder="اسم الدكتور/الطبيب *">
            <input type="email" id="signupEmail" class="input-field" placeholder="البريد الإلكتروني *">
            <input type="password" id="signupPassword" class="input-field" placeholder="كلمة المرور *">
            <input type="password" id="confirmPassword" class="input-field" placeholder="تأكيد كلمة المرور *">
            <div id="signupError" class="error-msg" style="display: none;"></div>
            <button id="doSignupBtn" class="auth-btn">إنشاء العيادة والتسجيل</button>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>
</body>
</html>
