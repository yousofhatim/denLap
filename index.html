<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>نظام عيادات الأسنان - تسجيل الدخول</title>
  <link rel="stylesheet" href="logInStyle.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
            <button class="tab-btn" data-tab="signup">تسجيل طبيب جديد</button>
        </div>

        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور">
            <div id="loginError" class="error-msg" style="display: none;"></div>
            <button id="doLoginBtn" class="auth-btn">دخول</button>
        </div>

        <div id="signupForm" class="auth-form hidden">
            <input type="text"     id="doctorName"      class="input-field" placeholder="اسم الطبيب *">
            <input type="text"     id="clinicName"      class="input-field" placeholder="اسم العيادة (اختياري)">
            <input type="text"     id="clinicNumber"    class="input-field" placeholder="رقم الهاتف *">
            <input type="email"    id="signupEmail"     class="input-field" placeholder="البريد الإلكتروني *">
            <input type="password" id="signupPassword"  class="input-field" placeholder="كلمة المرور *">
            <input type="password" id="confirmPassword" class="input-field" placeholder="تأكيد كلمة المرور *">
            <input type="text"     id="governorate"     class="input-field" placeholder="المحافظة *">
            <input type="text"     id="area"            class="input-field" placeholder="المنطقة *">
            <input type="text"     id="locationManual"  class="input-field" placeholder="إحداثيات الموقع (مثال: 30.0444, 31.2357) *">
            <small style="color:#9ad29a; display:block; text-align:right; margin:-6px 4px 0;">
                💡 افتح خرائط جوجل، اضغط على موقعك ثم انسخ الإحداثيات والصقها هنا
            </small>

            <div id="signupError" class="error-msg" style="display: none;"></div>
            <button id="doSignupBtn" class="auth-btn">إنشاء الحساب</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>
</body>
</html>
